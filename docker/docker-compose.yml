services:
  mysql:
    image: mysql:8.0
    env_file:
      - .env.docker
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dsp}
      MYSQL_USER: ${MYSQL_USER:-dspuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dsp_pass}
      MYSQL_ROOT_HOST: '%'
    command: --default-authentication-plugin=mysql_native_password --ssl=0
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ../app/Api:/usr/src/api
      - ../app/Api/logs:/usr/src/api/logs
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-dspuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-dsp_pass}
      DB_DATABASE: ${MYSQL_DATABASE:-dsp}
      DB_SSL: false
      DB_SSL_REJECT_UNAUTHORIZED: false
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_FILE_LOG: ${ENABLE_FILE_LOG:-true}
      ENABLE_CONSOLE_LOG: ${ENABLE_CONSOLE_LOG:-true}
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    volumes:
      - ../app/Viewers:/usr/src/web
      - web_node_modules:/usr/src/web/node_modules
    ports:
      - '${WEB_PORT:-8080}:3000'
    environment:
      CHOKIDAR_USEPOLLING: 'true'

volumes:
  db_data:
    name: db_data
  redis_data:
    name: redis_data
  web_node_modules:
    name: web_node_modules
