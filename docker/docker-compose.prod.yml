# Production-oriented compose — build static viewer + API with MySQL.
# Usage:
#   cp .env.docker .env.prod && edit secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dsp}
      MYSQL_USER: ${MYSQL_USER:-dspuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    command: --default-authentication-plugin=mysql_native_password --ssl=0
    volumes:
      - db_data_prod:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-dspuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE:-dsp}
      DB_SSL: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PORT: 3000
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile.prod
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3000/api/v1}
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data_prod:
  redis_data_prod:
